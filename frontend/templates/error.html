{% extends "base.html" %}

{% block title %}Application Error - StudySmart{% endblock %}

{% block content %}
<div class="container" style="text-align: center; padding: 100px 0;">
    <div style="font-size: 6rem; color: var(--danger); margin-bottom: 24px;"><i class="fas fa-exclamation-triangle"></i></div>
    <h1>Internal Server Error</h1>
    <p style="color: var(--gray-500); max-width: 500px; margin: 0 auto 40px;">
        Something went wrong on our end. Our smart assistants are looking into it.
    </p>
    <div class="flex flex-center gap-md">
        <button onclick="window.location.reload()" class="btn btn-outline btn-lg">Retry</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">Go Home</a>
    </div>
</div>
{% endblock %}
